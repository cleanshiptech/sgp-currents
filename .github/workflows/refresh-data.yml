name: refresh-tidal-data
on:
  schedule: [{cron: "30 18 * * *"}]   # daily ~02:30 SGT
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild every day in the window (use after extractor changes)"
        type: boolean
        default: false
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4            # code lives on the default branch
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install pillow numpy scipy requests
      - name: Restore frame cache (fetch each GIF at most once across runs)
        uses: actions/cache@v4
        with:
          path: frames-cache
          key: frames-${{ github.run_id }}
          restore-keys: frames-
      - name: Check out the data branch as a worktree
        run: |
          git config user.name "tidal-bot"
          git config user.email "bot@users.noreply.github.com"
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git worktree add ../pub data
          else
            git worktree add -b data ../pub; (cd ../pub && git rm -rfq . || true)
          fi
          mkdir -p ../pub/data
      - name: Build current month into the data branch (per-day commits, resumable)
        env:
          FORCE: ${{ inputs.force && '1' || '0' }}
          FRAME_CACHE: ${{ github.workspace }}/frames-cache
        run: |
          python - <<'PY'
          import datetime, os, json, calendar, subprocess, requests
          import data as D, fetch as F
          PUB="../pub/data"; os.makedirs(PUB, exist_ok=True)
          S=requests.Session(); force=os.environ.get("FORCE")=="1"
          sgt=datetime.datetime.utcnow()+datetime.timedelta(hours=8)
          def git(*a): subprocess.run(["git","-C","../pub",*a],check=True)
          git("config","user.name","tidal-bot"); git("config","user.email","bot@users.noreply.github.com")
          def avail(d):                       # does MPA have a frame for this day yet?
              try: return F.fetch_bytes("SSP", d.strftime("%Y%m%d"), "1200", S) is not None
              except Exception: return False
          def mdays(y,m): return [datetime.date(y,m,i) for i in range(1,calendar.monthrange(y,m)[1]+1)]
          days=mdays(sgt.year, sgt.month)
          ny,nm=(sgt.year+1,1) if sgt.month==12 else (sgt.year,sgt.month+1)
          if avail(datetime.date(ny,nm,1)):   # next month available -> archive it too
              days+=mdays(ny,nm)
          built=0
          for area in ("SSP","EBA"):
              for day in days:
                  ds=day.strftime("%Y%m%d"); fn=f"{PUB}/{area}_{ds}.json"
                  if os.path.exists(fn) and not force: continue   # already archived
                  if not avail(day): continue                     # MPA has no frames yet
                  d=D.build(area, ds)
                  if not d["frames"]: continue
                  json.dump(d, open(fn,"w"))
                  git("add", f"data/{area}_{ds}.json")            # commit+push each day so a
                  if subprocess.run(["git","-C","../pub","commit","-m",f"data: {area} {ds}"]).returncode==0:
                      git("push","origin","HEAD:data"); built+=1   # long build can't lose progress
                      print(f"built+pushed {area} {ds}: {len(d['frames'])}/48", flush=True)
          print(f"done; {built} day-file(s) built (force={force})")
          PY
